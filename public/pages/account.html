<body>
    <div id="particles-js"></div>
    <div id="loading-screen">
        <div id="loading-spinner"></div>
        <h1 id="ld"></h1>
    </div>

    <h1 id="title">Account</h1>

    <div id="signed-out" class="section" style="display:none">
        <h2>Sign In</h2>
        <p>sync your settings and data across devices</p>
        <div class="buttons-here">
            <button id="google-signin"><i class="fa-brands fa-google"></i> Sign in with Google</button>
        </div>
    </div>

    <div id="signed-in" class="section" style="display:none">
        <h2>Profile</h2>
        <img id="user-avatar" src="" alt="" referrerpolicy="no-referrer">
        <p id="user-name"></p>
        <p id="user-email"></p>
        <div class="buttons-here">
            <a id="view-profile-btn" class="bookmarklet-btn" style="display:none;text-decoration:none;" href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i> View Profile</a>
            <button id="sign-out-btn"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
    </div>

    <div id="username-section" class="section" style="display:none">
        <h2>Username</h2>
        <p>your public profile url: <span id="profile-url" style="color:var(--text-white)"></span></p>
        <input id="username-input" class="form__input" placeholder="username" maxlength="20" autocomplete="off" spellcheck="false">
        <div id="username-status" style="font-family:notitle;font-size:14px;margin-top:8px;text-align:center;min-height:20px;"></div>
        <div class="buttons-here">
            <button id="save-username" class="bookmarklet-btn"><i class="fa-solid fa-check"></i> Save Username</button>
        </div>
    </div>

    <div id="bio-section" class="section" style="display:none">
        <h2>Bio</h2>
        <textarea id="bio-input" class="form__input" maxlength="200" placeholder="write something about yourself..." style="height:100px;resize:vertical;"></textarea>
        <div id="bio-count" style="font-family:notitle;font-size:14px;color:var(--text-gray);text-align:center;margin-top:4px;">0 / 200</div>
        <div class="buttons-here">
            <button id="save-bio" class="bookmarklet-btn"><i class="fa-solid fa-check"></i> Save Bio</button>
        </div>
    </div>

    <div id="privacy-section" class="section" style="display:none">
        <h2>Privacy</h2>
        <label class="anticlose-container">
            <span class="checkmark">Show most played game on profile</span>
            <input type="checkbox" id="show-most-played" checked>
        </label>
    </div>

    <script type="module">
        import { auth, db, googleProvider, signInWithPopup, signOut, doc, getDoc, setDoc, deleteDoc } from '/js/firebase-init.js';

        const signedOut = document.getElementById("signed-out");
        const signedIn = document.getElementById("signed-in");
        const avatar = document.getElementById("user-avatar");
        const userName = document.getElementById("user-name");
        const userEmail = document.getElementById("user-email");
        const profileSections = ['username-section', 'bio-section', 'privacy-section'];

        let currentUsername = null;

        async function loadProfile(user) {
            const snap = await getDoc(doc(db, 'users', user.uid));
            if (!snap.exists()) return;
            const data = snap.data();

            currentUsername = data.username || null;
            if (currentUsername) {
                localStorage.setItem('soloUsername', currentUsername);
                document.getElementById('username-input').value = currentUsername;
                document.getElementById('profile-url').textContent = location.origin + '/u/' + currentUsername;
                const viewBtn = document.getElementById('view-profile-btn');
                viewBtn.href = '/u/' + currentUsername;
                viewBtn.style.display = '';
            }
            if (data.bio) document.getElementById('bio-input').value = data.bio;
            if (data.showMostPlayed !== undefined) {
                document.getElementById('show-most-played').checked = data.showMostPlayed;
            }
            updateBioCount();
        }

        function updateBioCount() {
            const bio = document.getElementById('bio-input').value;
            document.getElementById('bio-count').textContent = bio.length + ' / 200';
        }

        function showSections(visible) {
            profileSections.forEach(id => {
                document.getElementById(id).style.display = visible ? 'block' : 'none';
            });
        }

        function updateUI(user) {
            if (user) {
                signedOut.style.display = "none";
                signedIn.style.display = "block";
                avatar.src = user.photoURL || "";
                userName.textContent = user.displayName || "User";
                userEmail.textContent = user.email || "";
                showSections(true);
                loadProfile(user);
            } else {
                signedOut.style.display = "block";
                signedIn.style.display = "none";
                showSections(false);
                currentUsername = null;
            }
        }

        document.addEventListener('soloAuthChanged', (e) => updateUI(e.detail.user));

        document.getElementById("google-signin").addEventListener("click", () => {
            signInWithPopup(auth, googleProvider);
        });

        document.getElementById("sign-out-btn").addEventListener("click", () => {
            signOut(auth);
        });

        document.getElementById('bio-input').addEventListener('input', updateBioCount);

        document.getElementById('username-input').addEventListener('input', () => {
            const val = document.getElementById('username-input').value;
            const status = document.getElementById('username-status');
            const valid = /^[a-z0-9_]{3,20}$/.test(val);
            if (!val) { status.textContent = ''; return; }
            if (!valid) {
                status.style.color = '#e74c3c';
                status.textContent = '3–20 chars, lowercase letters, numbers, underscores only';
            } else {
                status.style.color = 'var(--text-gray)';
                status.textContent = '';
            }
        });

        document.getElementById('save-username').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;
            const val = document.getElementById('username-input').value.trim().toLowerCase();
            const status = document.getElementById('username-status');

            if (!/^[a-z0-9_]{3,20}$/.test(val)) {
                status.style.color = '#e74c3c';
                status.textContent = 'Invalid username format';
                return;
            }

            if (val !== currentUsername) {
                const taken = await getDoc(doc(db, 'usernames', val));
                if (taken.exists() && taken.data().uid !== user.uid) {
                    status.style.color = '#e74c3c';
                    status.textContent = 'Username already taken';
                    return;
                }
                if (currentUsername) await deleteDoc(doc(db, 'usernames', currentUsername));
                await setDoc(doc(db, 'usernames', val), { uid: user.uid });
            }

            await setDoc(doc(db, 'users', user.uid), { username: val }, { merge: true });
            currentUsername = val;
            localStorage.setItem('soloUsername', val);
            document.getElementById('profile-url').textContent = location.origin + '/u/' + val;
            const viewBtn = document.getElementById('view-profile-btn');
            viewBtn.href = '/u/' + val;
            viewBtn.style.display = '';
            status.style.color = '#2ecc71';
            status.textContent = 'Saved!';
            setTimeout(() => status.textContent = '', 2000);
        });

        document.getElementById('save-bio').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;
            const bio = document.getElementById('bio-input').value.trim();
            await setDoc(doc(db, 'users', user.uid), { bio }, { merge: true });
            const btn = document.getElementById('save-bio');
            btn.textContent = 'Saved!';
            setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-check"></i> Save Bio'; }, 2000);
        });

        document.getElementById('show-most-played').addEventListener('change', async () => {
            const user = auth.currentUser;
            if (!user) return;
            const val = document.getElementById('show-most-played').checked;
            await setDoc(doc(db, 'users', user.uid), { showMostPlayed: val }, { merge: true });
        });
    </script>
</body>
